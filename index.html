<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Locker</title>
    <style>
        *{
            margin-left: 10px;
            padding-left:5px;
            
        }
        .Total{
            background-color: rgb(248, 248, 247);
            width: 400px;
            height: 600px;
            align-content: center;
            justify-items: center;
            box-shadow:0 0 15px rgba(11, 11, 11, 0.15);
            border-radius: 10px;
        
        }
        body{
            /* margin-left: 700px; */
            /* margin-top: 50px; */ 
            justify-content: center;
            align-items: center;
            display: flex; 
            padding-top: 100px;
            height: 500px;
            box-shadow:rgb(21, 240, 225);

        }
        .logo{
            padding-bottom: 10px;
            margin-right: 20px;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            
        }
        .SI{
           
            padding-right: 220px;
            font-family:'Times New Roman', Times, serif;
            margin-bottom: 2px;
        }
        .new{
            margin-bottom: 20px;
            

        }
        label{
            margin-bottom: 10px;
            padding-right: 10px;
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
           
        }
        input{
            margin-bottom: 20px;
            padding-right: 110px;
            height: 25px;
            border-radius: 5px;

        }
        .forgot{
            margin-left: 155px;
            margin-bottom: 15px;
        }
        .sign{
            margin-left: 0px;
            margin-bottom: 20px;
            margin-left: 10px;
            width: 275px;
            height: 30px;
             border-radius: 5px;
             background-color:skyblue;
        }
        .or{
            margin-bottom: 10px;
            padding-left: 100px;
           
            
        }
        .google{
            margin-bottom: 10px;
            width: 275px;
            height: 30px;
             border-radius: 5px;
             background-color:rgb(157, 126, 237);
            
        }
        .left{
            margin-right: 50px;
            padding-bottom: 200px;
            padding-right: 10px;
            text-transform: capitalize;
            font-size:xx-large;
        }
        .tag{
            margin-right: 50px;
            /* padding-bottom: 10px; */
            padding-right: 100px;
            text-transform: capitalize;
            font-size:50px;
        }
        


    </style>
</head>
<body>
    <div class="left">
        <h1>Study Smart</h1>
    
       
    </div>
    <div class="tag">
        Read anywhere, <br>
        anytime.
    </div>
    <div class="Total">
        <div class="logo">
            <h2>📖Read Books</h2>
        </div>
        <div class="SI">
            <h1>Sign In</h1>
        </div>
        <div class="new">
            New here?
            <a href="creataccount.html">Create a Books Locker Account</a>
        </div>
        <form>
            <label>Email</label><br>
            <input type="email"><br>
            <label>Password</label><br>
            <input type="password"><br>
            <div class="forgot">
                <a href="">Forgot Password?</a>
            </div>
            <button type="button" class="sign">
                <a href="store.html">Sign In</a>
            </button>
            <div class="or">----OR----</div>
           <button type="button" class="google">
            <a href="">🌐Continue With Google</a>
           </button>
        </form>


    </div>
</body>
</html>
